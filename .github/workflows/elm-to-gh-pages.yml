# Made by Isaac Van Doren. Source at https://github.com/isaacvando/elm-to-gh-pages.
name: Deploy an Elm app to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time. New pushes queue rather than cancelling the current deploy.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./elm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install elm and tools
        uses: jorelali/setup-elm@v6
        with:
          elm-version: 0.19.1

      - run: |
          npm install elm-land elm-test

      - name: Build elm land app
        run: npx elm-land build

      # https://stackoverflow.com/questions/76115927/page-not-found-react-vite-app-not-routing-correctly-on-github-pages
      - name: Copy index.html to 404.html
        run: cp dist/index.html dist/404.html

      # Tests need to come after the build, otherwise
      # it complains about missing .elm-spa directories
      - name: Run tests
        run: npx elm-test

      - name: Compute build metadata
        id: meta
        run: |
          echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "timestamp=$(TZ=Europe/Zurich date '+%Y-%m-%d %H:%M %Z')" >> $GITHUB_OUTPUT

      - name: Inject build info into about.html
        uses: cschleiden/replace-tokens@v1
        with:
          files: '["elm/dist/about.html"]'
        env:
          SHORT_SHA: ${{ steps.meta.outputs.short_sha }}
          TIMESTAMP: ${{ steps.meta.outputs.timestamp }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "elm/dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
